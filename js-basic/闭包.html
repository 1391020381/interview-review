<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>闭包</title>
</head>

<body>
    <script>
        // 闭包是指有权访问另外一个函数作用域中变量的函数
        // 闭包的表现形式
        // 1 返回一个函数
        // 2 在定时器 事件监听 Ajax请求  Web Worker或者任何异步中，主要使用回调函数,实际上就是在是使用闭包。
        // 3 作为函数参数传递
        // 4 IIFE 立即执行函数 创建了闭包 保存了全局作用域和当前函数的作用域
    </script>
</body>

</html>
