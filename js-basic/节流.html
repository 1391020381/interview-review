    <script>
        // 节流的原理很简单:
        // 如果你持续触发事件,每隔一段时间,只执行一次事件

        function throttle(func, wait) {
            var context;
            var args;
            var previous = 0;
            return function () {
                var now = + new Date();
                context = this;
                args = arguments;
                if (now - previous > wait) {
                    func.apply(context, args)
                    previous = now
                }
            }
        }
        function throttle() {
            var timeout;
            var previous = 0;
            return function () {
                context = this;
                args = arguments
                if (!timeout) {
                    timeout = setTimeout(function () {
                        timeout = null;
                        fun.apply(context, args)
                    }, wait)
                }
            }
        }
    </script>
