<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promise 原型方法实现</title>
</head>

<body>
    <script>
        //
        class Promise {
            state = 'pending';
            value = null;
            callbacks = []
            constructor(fn) {
                fn(this._resolve.bind(this), this._reject.bind(this))
            }
            // 链式调用
            then(onFulfiled, onRejected) {
                return new Promise((resolve, reject) => {
                    this._handle({
                        onFulfiled: onFulfiled || null,
                        onRejected: onRejected || null,
                        resolve: resolve,
                        reject: reject
                    })
                })
            }
            _handle(callback) {
                // 第一个 Promise调用then 时 这个Promise状态还没有改变 把then 返回Promsie 回调push进callbacks
                if (this.state === 'pending') {
                    this.callbacks.push(callback)
                    return
                }
                let cb = this.state === 'fulfilled' ? callback.onFulfiled : callback.onRejected
                if (!cb) {
                    cb = this.state === 'fulfilled' ? callback.resolve : callback.reject
                    cb(this.value)
                    return
                }
                let ret;
                try {
                    ret = cb(this.value)
                    cb = this.state === 'fulfilled' ? callback.resolve : callback.reject;

                } catch (error) {
                    ret = error
                    cb = callback.reject
                } finally {
                    cb(ret)
                }

            }
            finally(onDone) {
                if (typeof onDone !== 'function') return this.then();
                let Promise = this.constructor;
                return this.then(
                    value => Promise.resolve(onDone()).then(() => value),
                    reason => Promise.resolve(onDone()).then(() => { throw reason })
                );
            }
            catch(onError) {
                return this.then(null, onError)
            }
            _resolve(value) {
                if (value && (typeof value === 'object' || typeof value === 'function')) {
                    var then = value.then;
                    if (typeof then === 'function') {
                        then.call(value, this._resolve.bind(this), this._reject.bind(this))
                        return
                    }
                }
                this.state = 'fulfiled'
                this.value = value
                this.callbacks.forEach(callback => {
                    this._handle(callback)
                })
            }
            _reject(error) {
                this.state = 'rejected';
                this.value = error;
                this.callbacks.forEach(callback => this._handle(callback))
            }
        }
    </script>
</body>

</html>
