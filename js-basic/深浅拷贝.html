    <script>
        // 手工实现一个浅拷贝
        function shallowClone(target) {
            if (typeof target === 'object' && targe !== null) {
                var cloneTarget = Array.isArray(target) ? [] : {}
                for (var prop in target) {
                    if (target.hasOwnProperty(prop)) {
                        cloneTarget[prop] = target[prop]
                    }
                }
                return cloneTarget
            } else {
                return target
            }
        }
        // JSON.stringify
        // 拷贝对象的值中如果有函数 undefined symbol 键值对会消失
        // Date引用类型会变成字符串
        // 无法拷贝不可枚举的属性
        // 无法拷贝对象的原型链
        // RegExp引用类型会变成空对象
        // NaN Infinity -Infinity  会变成null
        // 无法拷贝循环引用 即对象成环
        // 手工实现一个深拷贝
        function deepClone(target) {
            if (typeof target === 'object' && target !== null) {
                var cloneTarget = Array.isArray(target) ? [] : {}
                for (var prop in target) {
                    if (target.hasOwnProperty(prop)) { // 
                        var value = target[prop]
                        if (typeof vlaue === 'object' && value !== null) {
                            cloneTarget[prop] = deepClone(target[prop])
                        } else {
                            cloneTarget = target[prop]
                        }
                    }
                }
                return cloneTarget
            } else {
                return target
            }
        }

    <script>
        // 改进版
        function isComplexDataType(obj) {
            return (typeof obj === 'object' || typeof obj === 'function') && (obj !== null)
        }
        function deepClone(obj, hash = new WeakMap()) {

            if (obj.constructor === Date)

                return new Date(obj)       // 日期对象直接返回一个新的日期对象

            if (obj.constructor === RegExp)

                return new RegExp(obj)     //正则对象直接返回一个新的正则对象

            //如果循环引用了就用 weakMap 来解决

            if (hash.has(obj)) return hash.get(obj)

            let allDesc = Object.getOwnPropertyDescriptors(obj)

            //遍历传入参数所有键的特性

            let cloneObj = Object.create(Object.getPrototypeOf(obj), allDesc)

            //继承原型链

            hash.set(obj, cloneObj)

            for (let key of Reflect.ownKeys(obj)) {

                cloneObj[key] = (isComplexDataType(obj[key]) && typeof obj[key] !== 'function') ? deepClone(obj[key], hash) : obj[key]

            }

            return cloneObj

        }

        // 下面是验证代码

        let obj = {

            num: 0,

            str: '',

            boolean: true,

            unf: undefined,

            nul: null,

            obj: { name: '我是一个对象', id: 1 },

            arr: [0, 1, 2],

            func: function () { console.log('我是一个函数') },

            date: new Date(0),

            reg: new RegExp('/我是一个正则/ig'),

            [Symbol('1')]: 1,

        };

        Object.defineProperty(obj, 'innumerable', {

            enumerable: false, value: '不可枚举属性'
        }

        );

        obj = Object.create(obj, Object.getOwnPropertyDescriptors(obj))

        obj.loop = obj    // 设置loop成循环引用的属性

        let cloneObj = deepClone(obj)

        cloneObj.arr.push(4)

        console.log('obj', obj)

        console.log('cloneObj', cloneObj)

    </script>
